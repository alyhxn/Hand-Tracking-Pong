<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe Hands - 2D Pong Custom Layouts</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>2D Pong (Vertical/Horizontal Modes)</h2>

    <div class="controls-bar">
        <button id="btn-playpause">Start (P)</button>
        <button id="btn-footage">Toggle Footage</button>
        <button id="btn-mode">Rotate Screen</button>
        <button id="btn-switch">Switch Sides</button>
        <button id="btn-fullscreen">Fullscreen</button>
    </div>
    
    <div class="container">
        <video class="input_video" width="640" height="480" autoplay playsinline></video>
        <canvas class="output_canvas" width="640" height="480"></canvas>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
